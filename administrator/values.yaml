replicaCount: 2

image:
  repository: your-registry/administrator
  tag: "1.0.0"
  pullPolicy: IfNotPresent

imagePullSecrets: [ ]
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  name: ""

podAnnotations: { }
podLabels: { }

podSecurityContext: { }
securityContext: { }

service:
  type: ClusterIP
  port: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 3

startupProbe: { }
lifecycle: { }

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

env: [ ]
# Example:
# - name: ENV_NAME
#   value: "value"

envFrom: [ ]
# Example:
# - configMapRef:
#     name: my-config

command: [ ]
args: [ ]

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

revisionHistoryLimit: 10
progressDeadlineSeconds: 600
minReadySeconds: 0
terminationGracePeriodSeconds: 30
priorityClassName: ""
runtimeClassName: ""
hostAliases: [ ]

initContainers: [ ]
sidecarContainers: [ ]

volumes: [ ]
volumeMounts: [ ]

nodeSelector: { }
tolerations: [ ]
affinity: { }

topologySpreadConstraints: [ ]

deploymentAnnotations: { }

dnsPolicy: ClusterFirst
dnsConfig: { }
