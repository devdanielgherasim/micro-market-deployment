{{- if .Values.peerAuthentication.enabled }}
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: {{ include "audit.fullname" . }}
  labels:
    {{- include "audit.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "audit.selectorLabels" . | nindent 6 }}
  mtls:
    mode: {{ .Values.peerAuthentication.mode }}
{{- end }}
