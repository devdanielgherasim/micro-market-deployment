replicaCount: 1

# Global values - will be overridden by environment-specific values
global:
  environment: ""  # Set by ArgoCD parameter
  domain: ""       # Set by ArgoCD parameter
  keycloak:
    url: ""        # Set by ArgoCD parameter
    realm: ""      # Set by ArgoCD parameter

# Image configuration - will be overridden by environment-specific values
image:
  repository: ""  # Set by ArgoCD parameter
  tag: "test"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8089
  name: audit

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

env:
  - name: DB_USERNAME
    valueFrom:
      secretKeyRef:
        name: audit-db-secret
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: audit-db-secret
        key: password
  - name: DB_HOST
    valueFrom:
      configMapKeyRef:
        name: audit-config
        key: db.host
  - name: DB_PORT
    valueFrom:
      configMapKeyRef:
        name: audit-config
        key: db.port
  - name: DB_NAME
    valueFrom:
      configMapKeyRef:
        name: audit-config
        key: db.name
  - name: HIBERNATE_GENERATION
    value: "drop-and-create"
  - name: HIBERNATE_LOG_SQL
    value: "false"
  - name: HTTP_PORT
    value: "8089"
  - name: CORS_ORIGINS
    value: "*"
  - name: KEYCLOAK_URL
    valueFrom:
      configMapKeyRef:
        name: keycloak-config
        key: url
  - name: KEYCLOAK_CLIENT_ID
    value: "audit-service"
  - name: KEYCLOAK_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: keycloak-secret
        key: audit-service-secret

configMaps:
  audit-config:
    data:
      db.host: "postgresql.microservices.svc.cluster.local"
      db.port: "5432"
      db.name: "microservices1691713"

  keycloak-config:
    data:
      url: "https://keycloak.microservices.svc.cluster.local/auth/realms/microservices"

secrets:
  audit-db-secret:
    data:
      username: "postgres"
      password: "oRncHiOovwJAVOXK"  # Consider using external secrets management in production

  keycloak-secret:
    data:
      audit-service-secret: "audit-service-secret"  # Consider using external secrets management in production

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

ingress:
  enabled: false

revisionHistoryLimit: 10
progressDeadlineSeconds: 600
minReadySeconds: 0
terminationGracePeriodSeconds: 30

serviceAccount:
  create: false
  automount: true
  annotations: { }
  name: ""
