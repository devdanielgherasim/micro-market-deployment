global:
  environment: ""  # Set by ArgoCD parameter
  domain: ""       # Set by ArgoCD parameter
  keycloak:
    url: ""        # Set by ArgoCD parameter
    realm: ""      # Set by ArgoCD parameter

replicaCount: 1

image:
  repository: ""  # Set by ArgoCD parameter
  tag: "1.0.0"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    acme.cert-manager.io/http01-edit-in-place: "true"
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-production-cluster-issuer"
  hosts:
    - host: ""  # Set by ArgoCD parameter
      paths:
        - path: /
          pathType: Prefix
          backend:
            serviceName: micro-market-frontend
            servicePort: 8080
        - path: /api/products
          pathType: Prefix
          backend:
            serviceName: catalog
            servicePort: 8080
        - path: /api/audit
          pathType: Prefix
          backend:
            serviceName: audit
            servicePort: 8080
        - path: /api/orders
          pathType: Prefix
          backend:
            serviceName: orders
            servicePort: 8080
  tls:
    - secretName: frontend-tls
      hosts:
        - ""  # Set by ArgoCD parameter

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: { }

tolerations: [ ]

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - micro-market-frontend
          topologyKey: kubernetes.io/hostname

env: []

# ConfigMap for environment variables
configMaps:
  micro-market-frontend-config:
    data:
      NEXT_PUBLIC_KEYCLOAK_URL: ""  # Set by ArgoCD parameter
      NEXT_PUBLIC_KEYCLOAK_REALM: "microservices"
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: "micro-market-frontend"
      NEXT_PUBLIC_API_URL: ""  # Set by ArgoCD parameter
      NEXT_PUBLIC_API_TIMEOUT: "30000"
      NODE_ENV: "production"

# Reference the ConfigMap in envFrom
envFrom:
  - configMapRef:
      name: micro-market-frontend-config

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 30

serviceAccount:
  create: false
  automount: true
  annotations: { }
  name: ""
