# Global values - will be overridden by environment-specific values
global:
  environment: ""  # Set by ArgoCD parameter
  domain: ""       # Set by ArgoCD parameter
  keycloak:
    url: ""        # Set by ArgoCD parameter
    realm: ""      # Set by ArgoCD parameter

replicaCount: 1

# Image configuration - will be overridden by environment-specific values
image:
  repository: ""  # Set by ArgoCD parameter
  tag: "test"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 443
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  # Hosts and TLS configuration will be set in environment-specific values files
  hosts:
    - host: "{{ .Values.global.domain }}"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: frontend-tls
      hosts:
        - "{{ .Values.global.domain }}"

# Resources will be set in environment-specific values files
resources:
  limits: { }
  requests: { }

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: { }

tolerations: [ ]
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - micro-market-frontend
          topologyKey: kubernetes.io/hostname

env:
  - name: NEXT_PUBLIC_KEYCLOAK_URL
    value: "{{ .Values.global.keycloak.url }}"
  - name: NEXT_PUBLIC_KEYCLOAK_REALM
    value: "{{ .Values.global.keycloak.realm }}"
  - name: NEXT_PUBLIC_KEYCLOAK_CLIENT_ID
    value: "micro-market-frontend"
  - name: NEXT_PUBLIC_API_URL
    value: "https://{{ .Values.global.domain }}"
  - name: NEXT_PUBLIC_API_TIMEOUT
    value: "30000"
  - name: NODE_ENV
    value: "production"

# ConfigMaps will be set in environment-specific values files
configMaps:
  app-config:
    data:
      api-url: "https://{{ .Values.global.domain }}"
      keycloak-url: "{{ .Values.global.keycloak.url }}"
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi
    
strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 30