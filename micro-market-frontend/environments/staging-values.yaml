global:
  environment: ""  # Set by ArgoCD parameter
  domain: ""       # Set by ArgoCD parameter
  keycloak:
    url: ""        # Set by ArgoCD parameter
    realm: ""      # Set by ArgoCD parameter

replicaCount: 1

image:
  repository: ""  # Set by ArgoCD parameter
  tag: "1.0.0"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 3000

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: { }

tolerations: [ ]

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - micro-market-frontend
          topologyKey: kubernetes.io/hostname

env: []

# ConfigMap for environment variables
configMaps:
  micro-market-frontend-config:
    data:
      NEXT_PUBLIC_KEYCLOAK_URL: ""  # Set by ArgoCD parameter
      NEXT_PUBLIC_KEYCLOAK_REALM: "microservices"
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: "micro-market-frontend"
      NEXT_PUBLIC_API_URL: ""  # Set by ArgoCD parameter
      NEXT_PUBLIC_API_TIMEOUT: "30000"
      NODE_ENV: "production"

# Reference the ConfigMap in envFrom
envFrom:
  - configMapRef:
      name: micro-market-frontend-config

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 256Mi

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 30

serviceAccount:
  create: false
  automount: false
  annotations: { }
  name: ""
