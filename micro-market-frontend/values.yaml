# Global values - will be overridden by environment-specific values
global:
  environment: ""  # Set by ArgoCD parameter
  domain: ""       # Set by ArgoCD parameter
  keycloak:
    url: ""        # Set by ArgoCD parameter
    realm: ""      # Set by ArgoCD parameter

replicaCount: 1

# Image configuration - will be overridden by environment-specific values
image:
  repository: ""  # Set by ArgoCD parameter
  tag: "test"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    acme.cert-manager.io/http01-edit-in-place: "true"
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-production-cluster-issuer"
  hosts:
    - host: "microservices1691717.westeurope.cloudapp.azure.com"
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: frontend-tls
      hosts:
        - "microservices1691717.westeurope.cloudapp.azure.com"

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: { }

tolerations: [ ]

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - micro-market-frontend
          topologyKey: kubernetes.io/hostname

env:
  - name: NEXT_PUBLIC_KEYCLOAK_URL
    value: "https://microservices1691717.westeurope.cloudapp.azure.com/auth"
  - name: NEXT_PUBLIC_KEYCLOAK_REALM
    value: "microservices1691717"
  - name: NEXT_PUBLIC_KEYCLOAK_CLIENT_ID
    value: "micro-market-frontend"
  - name: NEXT_PUBLIC_API_URL
    value: "https://microservices1691717.westeurope.cloudapp.azure.com"
  - name: NEXT_PUBLIC_API_TIMEOUT
    value: "30000"
  - name: NODE_ENV
    value: "production"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 30

serviceAccount:
  create: false
  automount: true
  annotations: { }
  name: ""