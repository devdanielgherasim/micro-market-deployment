global:
  environment: ""  # Set by ArgoCD parameter
  domain: ""       # Set by ArgoCD parameter
  keycloak:
    url: ""        # Set by ArgoCD parameter
    realm: ""      # Set by ArgoCD parameter

replicaCount: 1

image:
  repository: ""  # Set by ArgoCD parameter
  tag: "1.0.0"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    acme.cert-manager.io/http01-edit-in-place: "true"
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt-production-cluster-issuer"
  hosts:
    - host: {{ .Values.global.domain }}
      paths:
        - path: /
          pathType: Prefix
          backend:
            serviceName: micro-market-frontend
            servicePort: 8080
        - path: /api/products
          pathType: Prefix
          backend:
            serviceName: catalog
            servicePort: 8080
        - path: /api/audit
          pathType: Prefix
          backend:
            serviceName: audit
            servicePort: 8080
        - path: /api/orders
          pathType: Prefix
          backend:
            serviceName: orders
            servicePort: 8080
  tls:
    - secretName: frontend-tls
      hosts:
        - {{ .Values.global.domain }}

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: { }

tolerations: [ ]

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - micro-market-frontend
          topologyKey: kubernetes.io/hostname

env:
  - name: NEXT_PUBLIC_KEYCLOAK_URL
    value: https://{{ .Values.global.domain }}/auth
  - name: NEXT_PUBLIC_KEYCLOAK_REALM
    value: "microservices"
  - name: NEXT_PUBLIC_KEYCLOAK_CLIENT_ID
    value: "micro-market-frontend"
  - name: NEXT_PUBLIC_API_URL
    value: https://{{ .Values.global.domain }}
  - name: NEXT_PUBLIC_API_TIMEOUT
    value: "30000"
  - name: NODE_ENV
    value: "production"

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 30

serviceAccount:
  create: false
  automount: true
  annotations: { }
  name: ""
