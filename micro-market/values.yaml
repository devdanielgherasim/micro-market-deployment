replicaCount: 1

# Global values - will be overridden by environment-specific values
global:
  environment: ""  # Set by ArgoCD parameter
  domain: ""       # Set by ArgoCD parameter
  keycloak:
    url: ""        # Set by ArgoCD parameter
    realm: ""      # Set by ArgoCD parameter

# Image configuration - will be overridden by environment-specific values
image:
  repository: ""  # Set in environment-specific values file
  pullPolicy: Always
  tag: "test"

imagePullSecrets:
  - name: acr-secret
nameOverride: ""
fullnameOverride: "micro-market-frontend"

serviceAccount:
  create: true
  annotations: { }
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "3000"

podLabels:
  app.kubernetes.io/part-of: microservices1691716
  app.kubernetes.io/component: frontend

podSecurityContext:
  fsGroup: 1001

securityContext:
  runAsUser: 1001
  runAsNonRoot: true
  allowPrivilegeEscalation: false

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  # Hosts and TLS configuration will be set in environment-specific values files
  hosts: [ ]
  tls: [ ]

# Resources will be set in environment-specific values files
resources:
  limits: { }
  requests: { }

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

nodeSelector: { }

tolerations: [ ]

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app.kubernetes.io/name
                operator: In
                values:
                  - micro-market-frontend
          topologyKey: kubernetes.io/hostname

# Environment variables will be set in environment-specific values files
env: [ ]

# ConfigMaps will be set in environment-specific values files
configMaps:
  app-config:
    data: { }

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 1
    maxUnavailable: 0

terminationGracePeriodSeconds: 30