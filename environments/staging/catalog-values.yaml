# catalog — STAGING environment overlay
# Merged on top of catalog/values.yaml by the ArgoCD ApplicationSet.

global:
  environment: staging
  domain: staging.danielgherasim.com
  keycloak:
    url: "https://auth.danielgherasim.com/auth/realms/microservices"
    realm: microservices

image:
  #   AWS ECR   <acct>.dkr.ecr.<region>.amazonaws.com/danielgherasim-microservices/staging/catalog
  #   Azure ACR <acr>.azurecr.io/danielgherasimmicroservices/catalog
  #   GCP AR    <region>-docker.pkg.dev/<project>/danielgherasim-microservices-staging/catalog
  repository: "REPLACED_BY_CI"
  tag: "REPLACED_BY_CI"

# Staging: sized to match dev — the free-tier 4-vCPU quota is shared across
# dev/staging/prod in the same cluster (ADR-7), not per-environment. See
# plans/2026-07-09-match-dev-app-sizing.md.
replicaCount: 1
autoscaling:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

extraEnv:
  - name: QUARKUS_LOG_LEVEL
    value: "INFO"
  - name: DEPLOYMENT_ENVIRONMENT
    value: "staging"
  - name: CORS_ORIGINS
    value: "https://staging.danielgherasim.com"
  - name: OTEL_TRACES_SAMPLER_ARG
    value: "0.5"
  # Demo seed data enabled in staging (ephemeral demo cluster). import.sql only
  # loads under drop-and-create, so seeded rows reset on pod restart.
  - name: HIBERNATE_GENERATION
    value: "drop-and-create"
  - name: HIBERNATE_LOAD_SCRIPT
    value: "import.sql"
  - name: HIBERNATE_LOG_SQL
    value: "false"
