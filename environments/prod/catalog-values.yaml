# catalog — PROD environment overlay
# Merged on top of catalog/values.yaml by the ArgoCD ApplicationSet.

global:
  environment: prod
  domain: danielgherasim.com              # apex hostname (D7)
  keycloak:
    url: "https://auth.danielgherasim.com/auth/realms/microservices"
    realm: microservices

image:
  #   AWS ECR   <acct>.dkr.ecr.<region>.amazonaws.com/danielgherasim-microservices/prod/catalog
  #   Azure ACR <acr>.azurecr.io/danielgherasimmicroservices/catalog
  #   GCP AR    <region>-docker.pkg.dev/<project>/danielgherasim-microservices-prod/catalog
  repository: "REPLACED_BY_CI"
  tag: "REPLACED_BY_CI"

# Prod: sized to match dev — the free-tier 4-vCPU quota is shared across
# dev/staging/prod in the same cluster (ADR-7), not per-environment. See
# plans/2026-07-09-match-dev-app-sizing.md.
replicaCount: 1
autoscaling:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

extraEnv:
  - name: QUARKUS_LOG_LEVEL
    value: "INFO"
  - name: DEPLOYMENT_ENVIRONMENT
    value: "prod"
  - name: CORS_ORIGINS
    value: "https://danielgherasim.com"
  - name: OTEL_TRACES_SAMPLER_ARG
    value: "0.1"                           # sample 10% of traces in prod
  - name: HIBERNATE_GENERATION
    value: "validate"
  - name: HIBERNATE_LOG_SQL
    value: "false"
