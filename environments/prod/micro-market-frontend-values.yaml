# micro-market-frontend — PROD environment overlay
# Merged on top of micro-market-frontend/values.yaml by the ArgoCD ApplicationSet.

global:
  environment: prod
  domain: danielgherasim.com              # apex hostname (D7)
  keycloak:
    url: "https://auth.danielgherasim.com"
    realm: microservices

image:
  #   AWS ECR   <acct>.dkr.ecr.<region>.amazonaws.com/danielgherasim-microservices/prod/micro-market-frontend
  #   Azure ACR <acr>.azurecr.io/danielgherasimmicroservices/micro-market-frontend
  #   GCP AR    <region>-docker.pkg.dev/<project>/danielgherasim-microservices-prod/micro-market-frontend
  repository: "REPLACED_BY_CI"
  tag: "REPLACED_BY_CI"

# Prod: sized to match dev — the free-tier 4-vCPU quota is shared across
# dev/staging/prod in the same cluster (ADR-7), not per-environment. See
# plans/2026-07-09-match-dev-app-sizing.md.
replicaCount: 1
autoscaling:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 256Mi

configMaps:
  micro-market-frontend-config:
    data:
      NEXT_PUBLIC_API_URL: "https://danielgherasim.com"
      NEXT_PUBLIC_KEYCLOAK_URL: "https://auth.danielgherasim.com"
      NEXT_PUBLIC_LOG_LEVEL: "info"
