# catalog — DEV environment overlay
# Merged on top of catalog/values.yaml by the ArgoCD ApplicationSet
# (valueFiles: ../environments/dev/catalog-values.yaml). Only per-env deltas live
# here; everything else comes from the chart defaults.

global:
  environment: dev
  domain: dev.danielgherasim.com # drives the HTTPRoute hostname (ingress.yaml default)
  keycloak:
    url: "https://auth.danielgherasim.com/auth/realms/microservices"
    realm: microservices
image:
  # Per-cloud/per-env registry path, written by CI build.sh / the Task 29 promote
  # stage — cannot be a single static value across clouds. Formulas:
  #   AWS ECR   <acct>.dkr.ecr.<region>.amazonaws.com/danielgherasim-microservices/dev/catalog
  #   Azure ACR <acr>.azurecr.io/danielgherasimmicroservices/catalog
  #   GCP AR    <region>-docker.pkg.dev/<project>/danielgherasim-microservices-dev/catalog
  repository: "acrdanielgherasimmicroservicesdev.azurecr.io/danielgherasim-microservices/catalog"
  tag: "4bcbb47eeff0688b9eaa4d7be6d3cd2e976a8652" # git SHA, written back by CI promote (Task 29)
# Dev: single replica, no autoscaling.
replicaCount: 1
autoscaling:
  enabled: false
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi
# Per-env container env (appended to the base env list by the deployment template).
extraEnv:
  - name: QUARKUS_LOG_LEVEL
    value: "DEBUG"
  - name: DEPLOYMENT_ENVIRONMENT
    value: "dev"
  - name: CORS_ORIGINS
    value: "https://dev.danielgherasim.com"
  - name: OTEL_TRACES_SAMPLER_ARG
    value: "1.0" # trace everything in dev
  # Demo seed data: drop-and-create + import.sql loads sample rows on start.
  - name: HIBERNATE_GENERATION
    value: "drop-and-create"
  - name: HIBERNATE_LOAD_SCRIPT
    value: "import.sql"
  - name: HIBERNATE_LOG_SQL
    value: "true"
