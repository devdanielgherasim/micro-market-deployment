global:
  environment: ""  # Set by ArgoCD parameter
  domain: ""       # Set by ArgoCD parameter
  keycloak:
    url: ""        # Set by ArgoCD parameter
    realm: ""      # Set by ArgoCD parameter

replicaCount: 1

image:
  repository: ""  # Set by ArgoCD parameter
  tag: "1.0.0"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8080
  name: catalog

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 250m
    memory: 256Mi

podSecurityContext:
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true
  runAsGroup: 1001
  runAsNonRoot: true
  runAsUser: 1001

# Root filesystem is read-only (above); Quarkus needs a writable /tmp at
# runtime (temp files, multipart uploads). Mounted as an in-memory emptyDir
# rather than relying on writable container layers.
volumeMounts:
  - name: tmp
    mountPath: /tmp

volumes:
  - name: tmp
    emptyDir: {}

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 5

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingress:
    - from:
        - podSelector: { }
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: istio-ingress
      ports:
        - protocol: TCP
          port: http
  egress:
    - { }

env:
  - name: HTTP_PORT
    value: "8080"
  - name: KEYCLOAK_CLIENT_ID
    value: "catalog-service"
  - name: AUDIT_SERVICE_URL
    value: "http://audit.microservices.svc.cluster.local:8080"
  - name: DB_USERNAME
    valueFrom:
      secretKeyRef:
        name: catalog-db-secret
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: catalog-db-secret
        key: password
  - name: DB_HOST
    valueFrom:
      configMapKeyRef:
        name: catalog-config
        key: db.host
  - name: DB_PORT
    valueFrom:
      configMapKeyRef:
        name: catalog-config
        key: db.port
  - name: DB_NAME
    valueFrom:
      configMapKeyRef:
        name: catalog-config
        key: db.name
  - name: OTEL_EXPORTER_OTLP_ENDPOINT
    value: "http://alloy-otlp.monitoring.svc.cluster.local:4317"
  - name: KEYCLOAK_URL
    valueFrom:
      configMapKeyRef:
        name: keycloak-config
        key: url
  - name: TOKEN_ISSUER
    valueFrom:
      configMapKeyRef:
        name: keycloak-config
        key: url
  - name: KEYCLOAK_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: keycloak-secret
        key: catalog-service-secret

# Per-environment env vars are appended to the container's env by the deployment
# template from environments/<env>/catalog-values.yaml. Kept as a separate list
# (not merged into `env` above) because Helm REPLACES, not merges, lists across
# value files — an overlay setting `extraEnv` cannot clobber the base `env`.
# Holds the vars that legitimately differ per environment: QUARKUS_LOG_LEVEL,
# CORS_ORIGINS, DEPLOYMENT_ENVIRONMENT, OTEL_TRACES_SAMPLER_ARG, and the
# HIBERNATE_* demo-seed toggles.
extraEnv: []

configMaps:
  catalog-config:
    data:
      db.host: "postgresql.postgresql.svc.cluster.local"
      db.port: "5432"
      db.name: "catalog"

secrets: { }

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

ingress:
  enabled: false

revisionHistoryLimit: 10
progressDeadlineSeconds: 600
minReadySeconds: 0
terminationGracePeriodSeconds: 30

serviceAccount:
  create: true
  automount: false
  annotations: { }
  name: ""

namespace:
  create: true
  labels:
    istio.io/dataplane-mode: ambient

httpRoute:
  enabled: true
  parentRefs:
    - name: public-gateway
      namespace: istio-ingress
  hostnames:
    - ""
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/products
      backendRefs:
        - name: catalog
          port: 8080

peerAuthentication:
  enabled: true
  mode: STRICT

authorizationPolicy:
  enabled: true
  allowedNamespaces:
    - istio-ingress
