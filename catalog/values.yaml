# Global values - will be overridden by environment-specific values
global:
  environment: ""  # Set by ArgoCD parameter
  domain: ""       # Set by ArgoCD parameter
  keycloak:
    url: ""        # Set by ArgoCD parameter
    realm: ""      # Set by ArgoCD parameter

replicaCount: 1

# Image configuration - will be overridden by environment-specific values
image:
  repository: ""  # Set in environment-specific values file
  tag: "test"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 8088
  name: catalog

# Resources will be set in environment-specific values files
resources:
  requests: { }
  limits: { }

livenessProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 10
  periodSeconds: 10
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health/ready
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  successThreshold: 1
  failureThreshold: 3

startupProbe:
  httpGet:
    path: /health/live
    port: http
  initialDelaySeconds: 20
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 2
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

# Base environment variables - environment-specific values will be set in environment-specific values files
env:
  - name: DB_USERNAME
    valueFrom:
      secretKeyRef:
        name: catalog-db-secret
        key: username
  - name: DB_PASSWORD
    valueFrom:
      secretKeyRef:
        name: catalog-db-secret
        key: password
  - name: DB_HOST
    valueFrom:
      configMapKeyRef:
        name: catalog-config
        key: db.host
  - name: DB_PORT
    valueFrom:
      configMapKeyRef:
        name: catalog-config
        key: db.port
  - name: DB_NAME
    valueFrom:
      configMapKeyRef:
        name: catalog-config
        key: db.name
  - name: HIBERNATE_GENERATION
    value: "update"
  - name: HIBERNATE_LOG_SQL
    value: "false"
  - name: KEYCLOAK_URL
    valueFrom:
      configMapKeyRef:
        name: keycloak-config
        key: url
  - name: KEYCLOAK_CLIENT_SECRET
    valueFrom:
      secretKeyRef:
        name: keycloak-secret
        key: catalog-service-secret

# ConfigMaps with placeholder values - will be overridden by environment-specific values
configMaps:
  catalog-config:
    data: { }

  keycloak-config:
    data: { }

# Secrets with placeholder values - will be overridden by environment-specific values
secrets:
  catalog-db-secret:
    data: { }

  keycloak-secret:
    data: { }

strategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 25%
    maxUnavailable: 25%

revisionHistoryLimit: 10
progressDeadlineSeconds: 600
minReadySeconds: 0
terminationGracePeriodSeconds: 30

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
  # Hosts and TLS configuration will be set in environment-specific values files
  hosts: [ ]
  tls: [ ]

serviceAccount:
  create: true
  automount: true
  annotations: { }
  name: ""