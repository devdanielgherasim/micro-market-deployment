image:
  tag: "test"

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

env:
  - name: HTTP_PORT
    value: "8088"
  - name: CORS_ORIGINS
    value: "https://ui-service.example.com,https://admin.example.com"
  - name: KEYCLOAK_CLIENT_ID
    value: "catalog-service"
  - name: AUDIT_SERVICE_URL
    value: "http://audit-service:8089"

configMaps:
  catalog-config:
    data:
      db.host: "postgres-catalog"
      db.port: "5432"
      db.name: "microservices1691716"

  keycloak-config:
    data:
      url: "{{ .Values.global.keycloak.url }}/realms/{{ .Values.global.keycloak.realm }}"

secrets:
  catalog-db-secret:
    data:
      username: "postgres"
      password: "changeme"  # Replace with actual encoded password or use external secrets

  keycloak-secret:
    data:
      catalog-service-secret: "changeme"  # Replace with actual encoded secret or use external secrets

ingress:
  hosts:
    - host: "{{ .Values.global.domain }}"
      paths:
        - path: /api/catalog
          pathType: Prefix
  tls:
    - secretName: catalog-tls
      hosts:
        - "{{ .Values.global.domain }}"
